<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeamSwipe - Contact</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="theme-contact">
  <div class="navbar">
    <div class="nav-left">
      <a class="brand" href="/">
        <span class="brand-text">TeamSwipe</span>
      </a>

      <nav class="menu">
        <ul>
          <li><a class="nav-btn" href="/browse">Browse</a></li>
          <li><a class="nav-btn" href="/create">Create</a></li>
          <li><a class="nav-btn active" href="/contact">Contact</a></li>
        </ul>
      </nav>
    </div>

    <div class="nav-right">
      <a class="icon-btn" href="/notification" aria-label="Notification">
        <i class="fa-regular fa-bell"></i>
      </a>

      <a class="icon-btn" href="/profile" aria-label="Profile">
        <i class="fa-regular fa-user"></i>
      </a>

      <a class="login-btn" href="/login">Log In</a>
    </div>
  </div>
  <div class="contact">
    <div class="suggestion-card">
      <div class="suggestion-left">
        <h1>CONTACT US</h1>
        <p>Contact us directly or fill out the form and we will get back to you.</p>

        <form action="https://formsubmit.co/6cf31fa51a530a278b17e572a4b41926" method="POST" class="contact-sent">
          <input class="contact-input" type="text" name="name" placeholder="Name" required>
          <input class="contact-input" type="email" name="email" placeholder="Email" required>
          <input class="contact-input" type="tel" name="phone" placeholder="Phone" required>
          <textarea class="contact-message" name="message" placeholder="Message" required></textarea>
          <button class="submit-button" type="submit">Submit</button>
        </form>
      </div>

      <div class="suggestion-right">
  <div class="contact-block">

    <div class="contact-gif">
      <div
        class="tenor-gif-embed"
        data-postid="23567063"
        data-share-method="host"
        data-aspect-ratio="1"
        data-width="100%">
        <a href="https://tenor.com/view/cat-sakura7777-gif-23567063">
          Cat Sakura7777 Sticker
        </a>
      </div>
    </div>

    <div class="contact-info">
      <p>Michelle Villagomez</p>
      <p>(626) 466 - 6172</p>
      <p>michellevillagomez9@gmail.com</p>
    </div>

    <div class="social-links">
      <a class="github-btn" href="https://github.com/michellevi09" target="_blank" aria-label="GitHub">
        <i class="fa-brands fa-github"></i>
      </a>

      <a class="linkedin-btn" href="https://www.linkedin.com/in/michelle-villagomez-177869276" target="_blank" aria-label="LinkedIn">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
    </div>

  </div>
</div>

<script type="text/javascript" async src="https://tenor.com/embed.js"></script>
</body>
</html>
